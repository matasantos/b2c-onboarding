<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure AD B2C — App Onboarding</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f6f7f9; --bg3: #eef1f5;
      --text: #1a1a1a; --text2: #555; --text3: #888;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --info-bg: #e6f1fb; --info-border: #185FA5; --info-text: #0c447c;
      --ok-bg: #eaf3de; --ok-border: #3b6d11; --ok-text: #27500a;
      --warn-bg: #faeeda; --warn-text: #633806;
      --danger-bg: #fcebeb; --danger-text: #791f1f;
      --navy: #1b3a6b; --blue: #185FA5;
      --radius: 8px; --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'Menlo', 'Consolas', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e; --bg2: #252525; --bg3: #2e2e2e;
        --text: #e8e8e8; --text2: #aaa; --text3: #666;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --info-bg: #0c2d4a; --info-text: #85b7eb;
        --ok-bg: #1a2e0a; --ok-text: #97c459;
        --warn-bg: #2e1f00; --warn-text: #fac775;
        --danger-bg: #2e0a0a; --danger-text: #f09595;
        --navy: #2a5099; --blue: #378add;
      }
    }
    body { font-family: var(--font); font-size: 14px; color: var(--text); background: var(--bg3); min-height: 100vh; }
    #root { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
    input[type=text], textarea, select {
      width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius);
      font-size: 13px; font-family: var(--font); background: var(--bg); color: var(--text);
    }
    textarea { resize: vertical; min-height: 64px; }
    button { font-family: var(--font); cursor: pointer; }
    a { color: var(--blue); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState } = React;

// ─── Section definitions ──────────────────────────────────────────────────────
// Steps: index, app, proto, [oidc, saml as substeps of proto], session, mfa, review
const STEPS = [
  { id: 'index',   label: 'Overview',          top: true  },
  { id: 'app',     label: 'Application info',  top: true,  num: '01' },
  { id: 'proto',   label: 'Protocol',          top: true,  num: '02' },
  { id: 'oidc',    label: 'OIDC / OAuth 2.0',  sub: true,  num: '03', cond: 'oidc' },
  { id: 'saml',    label: 'SAML 2.0',          sub: true,  num: '04', cond: 'saml' },
  { id: 'session', label: 'Session',           top: true,  num: '05' },
  { id: 'mfa',     label: 'MFA',               top: true,  num: '06' },
  { id: 'review',  label: 'Review',            top: true,  num: '07' },
];

const INIT = {
  appName:'', appDesc:'', appEnvs:[], bizContact:'', techContact:'', otherContacts:'',
  protocols:[],
  grantTypes:[], redirectUris:[''], logoutUri:'',
  scopes:[], customScopes:[''],
  claims:[{s:'givenName',m:'given_name'},{s:'surname',m:'family_name'},{s:'displayName',m:'name'},{s:'mail',m:''},{s:'',m:''}],
  accessTL:'', idTL:'', refreshTL:'', rollingTL:'', clientAuths:[],
  acsUrl:'', entityId:'', issuer:'', nameid:'', samlLogout:'', samlSigned:'',
  samlClaims:[{s:'givenName',m:''},{s:'surname',m:''},{s:'displayName',m:''},{s:'',m:''}],
  sessionType:'', sessionLT:'', ssoScope:'', sessionNote:'', sessionVisited:false, ssoSubstep:false,
  mfaEnabled:'', mfaMethods:[], mfaEnroll:'', mfaFreq:'',
  extensions:[], notes:'', oidcClaimsVisited:false, samlClaimsVisited:false, oidcClaimsOpen:false, samlClaimsOpen:false,
};

// ─── Style tokens ─────────────────────────────────────────────────────────────
const s = {
  field:   { marginBottom: '1rem' },
  label:   { display:'block', fontSize:12, fontWeight:500, color:'var(--text2)', marginBottom:5 },
  req:     { color:'#c0392b', marginLeft:2 },
  hint:    { fontSize:11, color:'var(--text3)', marginTop:3 },
  row2:    { display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 },
  cgroup:  { display:'flex', flexDirection:'column', gap:6 },
  cgrid2:  { display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 },
  btnBase: { padding:'7px 16px', borderRadius:'var(--radius)', fontSize:13, fontWeight:500,
             border:'0.5px solid var(--border2)', background:'var(--bg)', color:'var(--text)' },
  btnP:    { background:'var(--blue)', borderColor:'var(--blue)', color:'#fff' },
  btnS:    { background:'#3b6d11', borderColor:'#3b6d11', color:'#fff' },
  addLink: { fontSize:12, color:'var(--blue)', background:'none', border:'none', padding:0, cursor:'pointer' },
};

const TAGS = {
  ok:   { background:'var(--ok-bg)',   color:'var(--ok-text)' },
  bad:  { background:'var(--danger-bg)', color:'var(--danger-text)' },
  warn: { background:'var(--warn-bg)', color:'var(--warn-text)' },
  info: { background:'var(--info-bg)', color:'var(--info-text)' },
};

// ─── Reusable components ──────────────────────────────────────────────────────
function Tag({ text, type }) {
  return <span style={{ display:'inline-flex', alignItems:'center', padding:'1px 7px', borderRadius:100,
    fontSize:10, fontWeight:500, marginLeft:6, verticalAlign:'middle', ...TAGS[type] }}>{text}</span>;
}

function CI({ on, onClick, label, desc, tag, tagType, disabled }) {
  return (
    <div onClick={disabled ? null : onClick} style={{
      display:'flex', alignItems:'flex-start', gap:8, padding:'8px 10px',
      border: on ? '0.5px solid var(--info-border)' : '0.5px solid var(--border)',
      borderRadius:'var(--radius)', cursor: disabled ? 'default' : 'pointer',
      background: on ? 'var(--info-bg)' : 'transparent', opacity: disabled ? 0.45 : 1,
    }}>
      <div style={{ width:14, height:14, marginTop:2, border:'1.5px solid var(--border2)',
        borderRadius:3, background: on ? 'var(--blue)' : 'transparent', flexShrink:0,
        display:'flex', alignItems:'center', justifyContent:'center' }}>
        {on && <span style={{ color:'#fff', fontSize:10, lineHeight:1 }}>✓</span>}
      </div>
      <div style={{ flex:1 }}>
        <span style={{ fontSize:13, fontWeight:500, color:'var(--text)' }}>{label}</span>
        {tag && <Tag text={tag} type={tagType||'info'} />}
        {desc && <div style={{ fontSize:11, color:'var(--text2)', marginTop:1 }}>{desc}</div>}
      </div>
    </div>
  );
}

function UriList({ uris, onChange, onAdd, onRemove, placeholder }) {
  return <div>
    {uris.map((u,i) => (
      <div key={i} style={{ display:'flex', gap:6, alignItems:'center', marginBottom:5 }}>
        <input value={u} placeholder={placeholder||'https://'} onChange={e => onChange(i, e.target.value)} />
        <button onClick={() => onRemove(i)} style={{ background:'none', border:'none', color:'var(--text3)', cursor:'pointer', fontSize:18, lineHeight:1 }}>×</button>
      </div>
    ))}
    <button onClick={onAdd} style={s.addLink}>+ Add</button>
  </div>;
}

function ClaimsTable({ claims, onChange, onAdd }) {
  return <div>
    <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
      <thead><tr>
        {['Source attribute','Mapped claim'].map(h => <th key={h} style={{ textAlign:'left', fontWeight:500, color:'var(--text2)', padding:'5px 8px', borderBottom:'0.5px solid var(--border)', fontSize:11 }}>{h}</th>)}
      </tr></thead>
      <tbody>
        {claims.map((c,i) => <tr key={i}>
          <td style={{ padding:'4px 6px', borderBottom:'0.5px solid var(--border)' }}>
            <input style={{ fontFamily:'var(--mono)', fontSize:12 }} value={c.s} placeholder="objectId" onChange={e => onChange(i,'s',e.target.value)} />
          </td>
          <td style={{ padding:'4px 6px', borderBottom:'0.5px solid var(--border)' }}>
            <input style={{ fontFamily:'var(--mono)', fontSize:12 }} value={c.m} placeholder="sub" onChange={e => onChange(i,'m',e.target.value)} />
          </td>
        </tr>)}
      </tbody>
    </table>
    <button onClick={onAdd} style={{ ...s.addLink, marginTop:5 }}>+ Add claim</button>
  </div>;
}

// ─── Progress bar (top) ───────────────────────────────────────────────────────
function ProgressBar({ cur, S, onJump }) {
  if (cur === 0) return null;
  const protoChosen = S.protocols.length > 0;

  // Build visible step items
  const items = [];
  for (const step of STEPS) {
    if (step.id === 'index') continue;
    if (step.sub) {
      if (!protoChosen) continue; // hide substeps until protocol chosen
      if (!S.protocols.includes(step.cond)) continue;
    }
    items.push(step);
  }

  return (
    <div style={{ display:'flex', alignItems:'center', gap:0, marginBottom:'1.5rem', overflowX:'auto' }}>
      {items.map((step, i) => {
        const isCur = cur === STEPS.indexOf(step);
        const isPast = STEPS.indexOf(step) < cur;
        const isSub = step.sub;
        return (
          <React.Fragment key={step.id}>
            {i > 0 && <div style={{ flex: isSub ? '0 0 12px' : '1', height:1, background: isPast ? 'var(--blue)' : 'var(--border)', minWidth: isSub ? 12 : 20 }} />}
            <div onClick={() => STEPS.indexOf(step) < cur && onJump(STEPS.indexOf(step))}
              style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3, cursor: STEPS.indexOf(step) < cur ? 'pointer' : 'default', flexShrink:0 }}>
              <div style={{
                width: isSub ? 22 : 28, height: isSub ? 22 : 28, borderRadius:'50%',
                border: isCur ? '2px solid var(--blue)' : '1.5px solid var(--border2)',
                background: isPast ? 'var(--blue)' : isCur ? 'var(--info-bg)' : 'var(--bg)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize: isSub ? 10 : 11, fontWeight:500,
                color: isPast ? '#fff' : isCur ? 'var(--blue)' : 'var(--text3)',
              }}>
                {isPast ? '✓' : step.num}
              </div>
              <div style={{ fontSize:9, color: isCur ? 'var(--blue)' : 'var(--text3)', whiteSpace:'nowrap', fontWeight: isCur ? 500 : 400 }}>
                {isSub ? `↳ ${step.label}` : step.label}
              </div>
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ─── Nav buttons ──────────────────────────────────────────────────────────────
function Nav({ cur, onBack, onNext, onIndex, onExport, isLast }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:'1.25rem' }}>
      <button onClick={onBack} style={{ ...s.btnBase, visibility: cur===0 ? 'hidden' : 'visible' }}>← Back</button>
      <div style={{ display:'flex', gap:8 }}>
        {isLast && <button onClick={onExport} style={s.btnBase}>Export JSON</button>}
        <button onClick={onNext} style={{ ...s.btnBase, ...(isLast ? s.btnS : s.btnP) }}>
          {isLast ? 'Submit ↗' : 'Next →'}
        </button>
      </div>
    </div>
  );
}

function SecHeader({ title, sub, onIndex }) {
  return (
    <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:'1rem' }}>
      <div>
        <div style={{ fontSize:15, fontWeight:500, color:'var(--text)', marginBottom:3 }}>{title}</div>
        {sub && <div style={{ fontSize:12, color:'var(--text2)' }}>{sub}</div>}
      </div>
      <button onClick={onIndex} style={{ ...s.btnBase, fontSize:12, flexShrink:0 }}>≡ Index</button>
    </div>
  );
}

// ─── Main wizard ──────────────────────────────────────────────────────────────
function App() {
  const [cur, setCur] = useState(0);
  const [S, setS] = useState(INIT);

  const set = (k, v) => setS(p => ({ ...p, [k]: v }));
  const tArr = (k, v) => setS(p => {
    const a = p[k]; return { ...p, [k]: a.includes(v) ? a.filter(x=>x!==v) : [...a,v] };
  });

  const isActive = (step) => !step.cond || S.protocols.includes(step.cond);

  const completion = (step) => {
    if (step.id==='index'||step.id==='review') return null;
    if (!isActive(step)) return 'skip';
    const checks = {
      app: () => S.appName.trim() && S.techContact.trim(),
      proto: () => S.protocols.length > 0,
      oidc: () => S.grantTypes.length > 0,
      saml: () => S.acsUrl.trim() && S.entityId.trim(),
      session: () => S.sessionVisited,
      mfa: () => S.mfaEnabled,
    };
    return checks[step.id]?.() ? 'done' : 'todo';
  };

  const countDone = () => STEPS.filter(st => st.id!=='index'&&st.id!=='review'&&completion(st)==='done').length;
  const countTotal = () => STEPS.filter(st => st.id!=='index'&&st.id!=='review'&&isActive(st)).length;

  const buildNavOrder = () => {
    const protoChosen = S.protocols.length > 0;
    return STEPS.filter((st,i) => {
      if (st.id==='index') return false;
      if (st.sub && !protoChosen) return false;
      if (st.sub && !S.protocols.includes(st.cond)) return false;
      return true;
    });
  };

  const goNext = () => {
    const order = buildNavOrder();
    const ci = order.findIndex(st => STEPS.indexOf(st) === cur);
    const next = order[ci+1];
    if (next) setCur(STEPS.indexOf(next));
  };
  const goBack = () => {
    const order = buildNavOrder();
    const ci = order.findIndex(st => STEPS.indexOf(st) === cur);
    const prev = order[ci-1];
    if (prev) setCur(STEPS.indexOf(prev)); else setCur(0);
  };
  const jumpTo = (i) => setCur(i);

  const doExport = () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(S,null,2)], {type:'application/json'}));
    a.download = 'b2c-onboarding.json'; a.click();
  };

  const step = STEPS[cur];
  const isLast = step.id === 'review';
  const nav = <Nav cur={cur} onBack={goBack} onNext={goNext} onIndex={() => setCur(0)} onExport={doExport} isLast={isLast} />;
  const wrap = (content) => (
    <div>
      <ProgressBar cur={cur} S={S} onJump={jumpTo} />
      <div className="card">{content}</div>
      {nav}
    </div>
  );

  // ── INDEX ────────────────────────────────────────────────────────────────────
  if (step.id === 'index') {
    const done = countDone(), total = countTotal();
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    const protoChosen = S.protocols.length > 0;
    return (
      <div>
        <div style={{ fontSize:20, fontWeight:500, marginBottom:4 }}>B2C App Onboarding</div>
        <div style={{ fontSize:13, color:'var(--text2)', marginBottom:'1.25rem' }}>Complete all sections and return to the CSD / B2C Identity Team.</div>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:'1rem' }}>
          <div style={{ flex:1, height:4, background:'var(--border)', borderRadius:2, overflow:'hidden' }}>
            <div style={{ height:'100%', width:`${pct}%`, background:'#3b6d11', borderRadius:2, transition:'width .4s' }} />
          </div>
          <div style={{ fontSize:12, color:'var(--text2)', whiteSpace:'nowrap' }}>{done} / {total} done</div>
        </div>

        {STEPS.filter(st => st.id !== 'index').map((st, i) => {
          if (st.sub && !protoChosen) return null; // hide substeps until protocol chosen
          if (st.sub && !S.protocols.includes(st.cond)) return null;
          const c = completion(st);
          const si = STEPS.indexOf(st);
          return (
            <div key={st.id} onClick={() => jumpTo(si)} style={{
              display:'flex', alignItems:'center', gap:12, padding:'10px 12px',
              border: c==='done' ? '0.5px solid var(--ok-border)' : '0.5px solid var(--border)',
              borderRadius:'var(--radius)', marginBottom:6, cursor:'pointer',
              background: c==='done' ? 'var(--ok-bg)' : 'transparent',
              opacity: c==='skip' ? 0.4 : 1,
              marginLeft: st.sub ? 24 : 0,
            }}>
              <div style={{ width:22, height:22, borderRadius:'50%', border:'1.5px solid var(--border2)',
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, flexShrink:0,
                background: c==='done'?'#3b6d11':'transparent', color: c==='done'?'#fff':'var(--text2)' }}>
                {c==='done' ? '✓' : (st.sub ? '↳' : st.num)}
              </div>
              {st.sub && <div style={{ fontSize:10, color:'var(--text3)', marginLeft:-4 }}>sub</div>}
              <div style={{ flex:1, fontSize:13, fontWeight:500 }}>{st.label}</div>
              <span style={{ fontSize:11, padding:'2px 8px', borderRadius:100,
                background: c==='done'?'var(--ok-bg)':c==='skip'?'var(--bg2)':'var(--bg2)',
                color: c==='done'?'var(--ok-text)':c==='skip'?'var(--text3)':'var(--text2)' }}>
                {c==='done'?'Complete':c==='skip'?'N/A':st.id==='review'?'Final step':'To do'}
              </span>
            </div>
          );
        })}
        <button onClick={() => setCur(1)} style={{ ...s.btnBase, ...s.btnP, width:'100%', padding:10, marginTop:'1rem', fontSize:14 }}>
          Start →
        </button>
      </div>
    );
  }

  // ── APP INFO ─────────────────────────────────────────────────────────────────
  if (step.id === 'app') return wrap(<>
    <SecHeader title="Application information" sub="Identify the application and its owners." onIndex={() => setCur(0)} />
    <div style={s.row2}>
      <div style={s.field}><label style={s.label}>App name<span style={s.req}>*</span></label>
        <input value={S.appName} placeholder="" onChange={e=>set('appName',e.target.value)} /></div>
      <div style={s.field}><label style={s.label}>Environments</label>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
          {['DEV','TEST1','TEST2','PROD'].map(env => (
            <CI key={env} on={S.appEnvs.includes(env)} onClick={() => tArr('appEnvs',env)} label={env} />
          ))}
        </div></div>
    </div>
    <div style={s.field}><label style={s.label}>Description</label>
      <textarea value={S.appDesc} placeholder="Brief purpose of the application." onChange={e=>set('appDesc',e.target.value)} /></div>
    <div style={s.field}><label style={s.label}>Business contact(s)</label>
      <input value={S.bizContact} placeholder="Comma-separated" onChange={e=>set('bizContact',e.target.value)} />
      <div style={s.hint}>Business owner — responsible for the application.</div></div>
    <div style={s.field}><label style={s.label}>Technical / SME contact(s)<span style={s.req}>*</span></label>
      <input value={S.techContact} placeholder="Comma-separated" onChange={e=>set('techContact',e.target.value)} />
      <div style={s.hint}>Technical owner — responsible for B2C configuration.</div></div>
    <div style={s.field}><label style={s.label}>Other technical contacts</label>
      <input value={S.otherContacts} placeholder="Ops, support, developers…" onChange={e=>set('otherContacts',e.target.value)} />
      <div style={s.hint}>Will receive platform updates and maintenance notices.</div></div>
  </>);

  // ── PROTOCOL ─────────────────────────────────────────────────────────────────
  if (step.id === 'proto') {
    const protoChosen = S.protocols.length > 0;
    return wrap(<>
      <SecHeader title="Protocol selection" sub="Choose your protocol(s). Sub-steps will appear below." onIndex={() => setCur(0)} />
      <div style={s.field}><label style={s.label}>Protocol(s) required<span style={s.req}>*</span></label>
        <div style={s.cgroup}>
          <CI on={S.protocols.includes('oidc')} onClick={() => tArr('protocols','oidc')} label="OpenID Connect / OAuth 2.0" tag="OIDC" tagType="ok" desc="Web apps, SPAs, mobile, APIs." />
          <CI on={S.protocols.includes('saml')} onClick={() => tArr('protocols','saml')} label="SAML 2.0" tag="SAML" tagType="info" desc="On-premises and legacy enterprise apps." />
        </div>
      </div>

      {protoChosen && (
        <div style={{ marginTop:'1rem', padding:'1rem', background:'var(--bg2)', borderRadius:'var(--radius)', border:'0.5px solid var(--border)' }}>
          <div style={{ fontSize:12, color:'var(--text2)', marginBottom:10, fontWeight:500 }}>
            Configuration sub-steps:
          </div>
          <div style={s.cgroup}>
            {S.protocols.includes('oidc') && (
              <div onClick={() => setCur(STEPS.findIndex(st=>st.id==='oidc'))} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 12px', background:'var(--info-bg)', border:'0.5px solid var(--info-border)', borderRadius:'var(--radius)', cursor:'pointer' }}>
                <div style={{ width:6, height:6, borderRadius:'50%', background:'var(--blue)' }} />
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:500, color:'var(--info-text)' }}>03 — OIDC / OAuth 2.0 configuration</div>
                  <div style={{ fontSize:11, color:'var(--text2)' }}>Grant types, redirect URIs, scopes, claims, token lifetimes</div>
                </div>
                <span style={{ fontSize:12, color:'var(--info-text)' }}>Configure →</span>
              </div>
            )}
            {S.protocols.includes('saml') && (
              <div onClick={() => setCur(STEPS.findIndex(st=>st.id==='saml'))} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 12px', background:'var(--info-bg)', border:'0.5px solid var(--info-border)', borderRadius:'var(--radius)', cursor:'pointer' }}>
                <div style={{ width:6, height:6, borderRadius:'50%', background:'var(--blue)' }} />
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:500, color:'var(--info-text)' }}>04 — SAML 2.0 configuration</div>
                  <div style={{ fontSize:11, color:'var(--text2)' }}>ACS URL, Entity ID, NameID format, assertions, claims</div>
                </div>
                <span style={{ fontSize:12, color:'var(--info-text)' }}>Configure →</span>
              </div>
            )}
          </div>
          <div style={{ fontSize:11, color:'var(--text3)', marginTop:8 }}>You can also continue with Next → and fill these in sequence.</div>
        </div>
      )}

      <div style={s.field}>
        <CI on={!!S.multiTenant} onClick={() => set('multiTenant', S.multiTenant ? '' : 'yes')} label="Multi-tenant support?" desc="This application will be used across multiple B2C tenants." />
      </div>
    </>);
  }

  // ── OIDC ─────────────────────────────────────────────────────────────────────
  if (step.id === 'oidc') return wrap(<>
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:'0.5rem' }}>
      <div style={{ fontSize:10, padding:'2px 8px', borderRadius:100, background:'var(--info-bg)', color:'var(--info-text)', fontWeight:500 }}>SUB-STEP of 02</div>
    </div>
    <SecHeader title="OIDC / OAuth 2.0 configuration" sub="Grant types, redirect URIs, scopes, claims, token lifetimes." onIndex={() => setCur(0)} />
    <div style={s.field}><label style={s.label}>Grant types<span style={s.req}>*</span></label>
      <div style={s.cgroup}>
        <CI on={S.grantTypes.includes('authcode')} onClick={() => tArr('grantTypes','authcode')} label="Authorization Code Flow" tag="Recommended" tagType="ok" desc="Web apps with a server-side back-end." />
        <CI on={S.grantTypes.includes('pkce')}     onClick={() => tArr('grantTypes','pkce')}     label="PKCE" tag="SPAs / Mobile" tagType="info" desc="Required for public clients." />
        <CI on={S.grantTypes.includes('implicit')} onClick={() => tArr('grantTypes','implicit')} label="Implicit Flow" tag="Deprecated" tagType="bad" desc="Will be removed in OAuth 2.1. Use PKCE instead." />
        <CI on={S.grantTypes.includes('ropc')}     onClick={() => tArr('grantTypes','ropc')}     label="ROPC" tag="Not recommended" tagType="bad" desc="Users type credentials directly into the app." />
        <CI on={S.grantTypes.includes('cc')}       onClick={() => tArr('grantTypes','cc')}       label="Client Credentials" tag="M2M" tagType="info" desc="App authenticates without user interaction." />
      </div></div>
    <div style={s.field}><label style={s.label}>Redirect URIs</label>
      <UriList uris={S.redirectUris} placeholder="https://app.example.com/callback"
        onChange={(i,v) => setS(p=>{const u=[...p.redirectUris];u[i]=v;return{...p,redirectUris:u}})}
        onAdd={() => setS(p=>({...p,redirectUris:[...p.redirectUris,'']}))}
        onRemove={i => setS(p=>{const u=p.redirectUris.filter((_,j)=>j!==i);return{...p,redirectUris:u.length?u:['']}})} /></div>
    <div style={s.field}><label style={s.label}>Logout URI</label>
      <input value={S.logoutUri} placeholder="https://app.example.com/signout" onChange={e=>set('logoutUri',e.target.value)} /></div>
    <div style={s.field}><label style={s.label}>Scopes</label>
      <div style={s.cgrid2}>
        {['openid','profile','email','offline_access'].map(sc => <CI key={sc} on={S.scopes.includes(sc)} onClick={() => tArr('scopes',sc)} label={sc} />)}
      </div></div>
    <div style={s.field}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
        <label style={s.label}>Claims mapping</label>
        <button onClick={() => setS(p=>({...p,oidcClaimsVisited:true,oidcClaimsOpen:!p.oidcClaimsOpen}))}
          style={{ ...s.addLink, fontSize:12 }}>
          {S.oidcClaimsOpen ? 'Collapse ▲' : 'Configure ▼'}
        </button>
      </div>
      {!S.oidcClaimsOpen && <div style={{ fontSize:12, color:'var(--text3)', padding:'8px 10px', background:'var(--bg2)', borderRadius:'var(--radius)', border:'0.5px solid var(--border)' }}>
        {S.claims.filter(c=>c.s||c.m).length} claim(s) configured — click Configure to edit
      </div>}
      {S.oidcClaimsOpen && <div style={{ border:'0.5px solid var(--info-border)', borderRadius:'var(--radius)', padding:'1rem', background:'var(--info-bg)' }}>
        <div style={{ fontSize:11, color:'var(--info-text)', marginBottom:8 }}>Sub-configuration: OIDC claims</div>
        <ClaimsTable claims={S.claims}
          onChange={(i,f,v) => setS(p=>{const c=[...p.claims];c[i]={...c[i],[f]:v};return{...p,claims:c}})}
          onAdd={() => setS(p=>({...p,claims:[...p.claims,{s:'',m:''}]}))} />
      </div>}
    </div>
    <div style={s.field}><label style={s.label}>Token lifetimes <span style={{ fontWeight:400, color:'var(--text3)' }}>(blank = default)</span></label>
      {[['Access token','accessTL','7200'],['ID token','idTL','7200'],['Refresh token','refreshTL','86400'],['Rolling refresh','rollingTL','86400']].map(([lbl,key,def]) => (
        <div key={key} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
          <label style={{ fontSize:12, color:'var(--text2)', minWidth:180, flexShrink:0 }}>{lbl} (default {def}s)</label>
          <input style={{ width:80 }} value={S[key]} placeholder={def} onChange={e=>set(key,e.target.value)} />
          <span style={{ fontSize:11, color:'var(--text3)' }}>sec</span>
        </div>
      ))}</div>
    <div style={s.field}><label style={s.label}>Client authentication</label>
      <div style={s.cgroup}>
        <CI on={S.clientAuths.includes('secret')} onClick={() => tArr('clientAuths','secret')} label="Client secret" />
        <CI on={S.clientAuths.includes('cert')}   onClick={() => tArr('clientAuths','cert')}   label="Client certificate" tag="Preferred" tagType="ok" />
      </div></div>
  </>);

  // ── SAML ─────────────────────────────────────────────────────────────────────
  if (step.id === 'saml') return wrap(<>
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:'0.5rem' }}>
      <div style={{ fontSize:10, padding:'2px 8px', borderRadius:100, background:'var(--info-bg)', color:'var(--info-text)', fontWeight:500 }}>SUB-STEP of 02</div>
    </div>
    <SecHeader title="SAML 2.0 configuration" sub="Assertions, endpoints, NameID format, claims." onIndex={() => setCur(0)} />
    <div style={s.row2}>
      <div style={s.field}><label style={s.label}>ACS URL<span style={s.req}>*</span></label>
        <input value={S.acsUrl} placeholder="https://app.example.com/saml/acs" onChange={e=>set('acsUrl',e.target.value)} /></div>
      <div style={s.field}><label style={s.label}>Entity ID (Issuer)<span style={s.req}>*</span></label>
        <input value={S.entityId} placeholder="https://app.example.com" onChange={e=>set('entityId',e.target.value)} /></div>
    </div>
    <div style={s.field}><label style={s.label}>NameID format</label>
      <div style={s.cgrid2}>
        {['Persistent','Transient','EmailAddress','Unspecified'].map(f => <CI key={f} on={S.nameid===f} onClick={() => set('nameid',f)} label={f} />)}
      </div></div>
    <div style={s.field}><label style={s.label}>Logout URL</label>
      <input value={S.samlLogout} onChange={e=>set('samlLogout',e.target.value)} /></div>
    <div style={s.field}><label style={s.label}>Assertion signing</label>
      <div style={s.cgroup}>
        <CI on={S.samlSigned==='yes'} onClick={() => set('samlSigned','yes')} label="Yes — signed assertions" />
        <CI on={S.samlSigned==='no'}  onClick={() => set('samlSigned','no')}  label="No" />
      </div></div>
    <div style={s.field}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
        <label style={s.label}>SAML claims mapping</label>
        <button onClick={() => setS(p=>({...p,samlClaimsVisited:true,samlClaimsOpen:!p.samlClaimsOpen}))}
          style={{ ...s.addLink, fontSize:12 }}>
          {S.samlClaimsOpen ? 'Collapse ▲' : 'Configure ▼'}
        </button>
      </div>
      {!S.samlClaimsOpen && <div style={{ fontSize:12, color:'var(--text3)', padding:'8px 10px', background:'var(--bg2)', borderRadius:'var(--radius)', border:'0.5px solid var(--border)' }}>
        {S.samlClaims.filter(c=>c.s||c.m).length} claim(s) configured — click Configure to edit
      </div>}
      {S.samlClaimsOpen && <div style={{ border:'0.5px solid var(--info-border)', borderRadius:'var(--radius)', padding:'1rem', background:'var(--info-bg)' }}>
        <div style={{ fontSize:11, color:'var(--info-text)', marginBottom:8 }}>Sub-configuration: SAML claims</div>
        <ClaimsTable claims={S.samlClaims}
          onChange={(i,f,v) => setS(p=>{const c=[...p.samlClaims];c[i]={...c[i],[f]:v};return{...p,samlClaims:c}})}
          onAdd={() => setS(p=>({...p,samlClaims:[...p.samlClaims,{s:'',m:''}]}))} />
      </div>}
    </div>
  </>);

  // ── SESSION ───────────────────────────────────────────────────────────────────
  if (step.id === 'session') {
    if (!S.sessionVisited) setS(p=>({...p, sessionVisited:true}));
    return wrap(<>
    <SecHeader title="Session behavior" sub="Defaults apply if left blank." onIndex={() => setCur(0)} />
    <div style={s.field}><label style={s.label}>Session type</label>
      <div style={s.cgroup}>
        <CI on={S.sessionType==='rolling'}  onClick={() => set('sessionType','rolling')}  label="Rolling session" tag="Default" tagType="info" desc="Expiry extends after each valid request." />
        <CI on={S.sessionType==='absolute'} onClick={() => set('sessionType','absolute')} label="Absolute session" desc="Fixed expiry regardless of activity." />
      </div></div>
    <div style={s.field}><label style={s.label}>Session lifetime (default: 7200 sec)</label>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <input style={{ width:90 }} value={S.sessionLT} placeholder="7200" onChange={e=>set('sessionLT',e.target.value)} />
        <span style={{ fontSize:11, color:'var(--text3)' }}>sec</span>
      </div></div>
    <div style={s.field}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
        <label style={s.label}>SSO behaviour</label>
        <button onClick={() => setS(p=>({...p,ssoSubstep:!p.ssoSubstep}))}
          style={{ ...s.addLink, fontSize:12 }}>
          {S.ssoSubstep ? 'Use default ▲' : 'Custom SSO scope ▼'}
        </button>
      </div>
      {!S.ssoSubstep && <div style={{ fontSize:12, color:'var(--text3)', padding:'8px 10px', background:'var(--bg2)', borderRadius:'var(--radius)', border:'0.5px solid var(--border)' }}>
        Default: Tenant-wide SSO — click "Custom SSO scope" to override
      </div>}
      {S.ssoSubstep && <div style={{ border:'0.5px solid var(--info-border)', borderRadius:'var(--radius)', padding:'1rem', background:'var(--info-bg)' }}>
        <div style={{ fontSize:11, color:'var(--info-text)', marginBottom:8 }}>Sub-configuration: SSO scope</div>
        <div style={s.cgrid2}>
          {[['Tenant','Default','info','Shared SSO across all apps.'],['Application',null,null,'Scoped to this app only.'],['Policy',null,null,'Scoped to this policy only.'],['Suppressed',null,null,'No SSO — always re-authenticate.']].map(([v,tag,tt,desc]) =>
            <CI key={v} on={S.ssoScope===v} onClick={() => set('ssoScope',v)} label={v} tag={tag} tagType={tt} desc={desc} />
          )}
        </div>
        <div style={{ marginTop:'0.75rem' }}><label style={s.label}>Justification</label>
          <textarea value={S.sessionNote} placeholder="Required if changing the default." onChange={e=>set('sessionNote',e.target.value)} style={{ marginTop:4 }} />
        </div>
      </div>}
    </div>
  </>);
  }

  // ── MFA ───────────────────────────────────────────────────────────────────────
  if (step.id === 'mfa') return wrap(<>
    <SecHeader title="MFA & extensions" sub="" onIndex={() => setCur(0)} />
    <div style={s.field}><label style={s.label}>MFA requirement</label>
      <div style={s.cgroup}>
        <CI on={S.mfaEnabled==='yes'} onClick={() => set('mfaEnabled','yes')} label="Enabled" />
        <CI on={S.mfaEnabled==='no'}  onClick={() => set('mfaEnabled','no')}  label="Disabled" />
      </div></div>
    {S.mfaEnabled==='yes' && <>
      <div style={s.field}><label style={s.label}>MFA method(s)</label>
        <div style={s.cgroup}>
          <CI on={S.mfaMethods.includes('app')}   onClick={() => tArr('mfaMethods','app')}   label="Authenticator app" />
          <CI on={S.mfaMethods.includes('email')} onClick={() => tArr('mfaMethods','email')} label="Email MFA" tag="Needs confirmation" tagType="warn" desc="Check ICON availability before selecting." />
          <CI on={false} disabled label="SMS" tag="Not supported" tagType="bad" />
        </div></div>
      <div style={s.field}><label style={s.label}>Enrollment policy</label>
        <div style={s.cgroup}>
          <CI on={S.mfaEnroll==='required'} onClick={() => set('mfaEnroll','required')} label="Required at first login" />
          <CI on={S.mfaEnroll==='optional'} onClick={() => set('mfaEnroll','optional')} label="Optional" />
        </div></div>
      <div style={s.field}><label style={s.label}>MFA frequency</label>
        <div style={s.cgroup}>
          {[['every','Every login'],['session','Once per session'],['risky','After risky sign-in']].map(([v,l]) =>
            <CI key={v} on={S.mfaFreq===v} onClick={() => set('mfaFreq',v)} label={l} />
          )}
        </div></div>
    </>}
    <div style={{ ...s.field, marginTop:'1rem' }}><label style={s.label}>B2C extensions</label>
      <div style={s.cgroup}>
        <CI on={S.extensions.includes('eventhub')} onClick={() => tArr('extensions','eventhub')} label="Event stream via Event Hubs" tag="Azure costs" tagType="warn" />
        <CI on={S.extensions.includes('customui')} onClick={() => tArr('extensions','customui')} label="Custom UI (Figma files required)" />
      </div></div>
    <div style={s.field}><label style={s.label}>Additional notes</label>
      <textarea value={S.notes} placeholder="Email templates, localisation, other requirements…" onChange={e=>set('notes',e.target.value)} /></div>
  </>);

  // ── REVIEW ────────────────────────────────────────────────────────────────────
  if (step.id === 'review') {
    const incomplete = STEPS.filter(st => st.id!=='index'&&st.id!=='review'&&isActive(st)&&completion(st)!=='done'&&completion(st)!=='skip');
    return wrap(<>
      <SecHeader title="Review & submit" sub="" onIndex={() => setCur(0)} />
      <div style={{ background: incomplete.length?'var(--warn-bg)':'var(--ok-bg)', border:`0.5px solid ${incomplete.length?'#d4860a':'var(--ok-border)'}`, borderRadius:'var(--radius)', padding:'10px 12px', marginBottom:'1rem', fontSize:13, color: incomplete.length?'var(--warn-text)':'var(--ok-text)' }}>
        {incomplete.length ? <><strong>Incomplete:</strong> {incomplete.map(st=>st.label).join(', ')}</> : 'All sections complete — ready to submit.'}
      </div>
      <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:'1rem' }}>
        {[['App name',S.appName],['Environments',S.appEnvs.join(', ')],['Protocol(s)',S.protocols.map(p=>p.toUpperCase()).join(', ')],
          ...(S.protocols.includes('oidc')?[['Grant types',S.grantTypes.join(', ')],['Client auth',S.clientAuth]]:[]),
          ...(S.protocols.includes('saml')?[['ACS URL',S.acsUrl]]:[]),
          ['SSO scope',S.ssoScope||'Default (tenant)'],['MFA',S.mfaEnabled]].map(([l,v]) => (
          <div key={l} style={{ background:'var(--bg2)', borderRadius:'var(--radius)', padding:'8px 12px', minWidth:130 }}>
            <div style={{ fontSize:11, color:'var(--text3)', marginBottom:2 }}>{l}</div>
            <div style={{ fontSize:13, fontWeight:500, wordBreak:'break-all' }}>{v||'—'}</div>
          </div>
        ))}
      </div>
      {STEPS.filter(st=>st.id!=='index'&&st.id!=='review'&&isActive(st)).map(st => {
        const c = completion(st);
        return <div key={st.id} onClick={() => jumpTo(STEPS.indexOf(st))} style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 0', borderBottom:'0.5px solid var(--border)', cursor:'pointer', paddingLeft: st.sub ? 16 : 0 }}>
          <span style={{ fontSize:16, color:c==='done'?'#3b6d11':c==='skip'?'var(--text3)':'#c0392b' }}>{c==='done'?'✓':c==='skip'?'–':'!'}</span>
          {st.sub && <span style={{ fontSize:10, color:'var(--text3)' }}>↳</span>}
          <span style={{ fontSize:13 }}>{st.label}</span>
          <span style={{ marginLeft:'auto', fontSize:12, color:'var(--text3)' }}>{c==='done'?'Complete':c==='skip'?'N/A':'Incomplete'}</span>
        </div>;
      })}
    </>);
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
